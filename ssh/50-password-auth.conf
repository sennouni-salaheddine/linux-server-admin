# Drop-in configuration voor SSH password authentication
# Opgelost probleem: in OpenSSH 9.x is de standaardwaarde van
# PasswordAuthentication 'no'. Wanneer de regel in /etc/ssh/sshd_config
# uitgecommentarieerd is, weigert de server login met wachtwoord.
#
# Deze drop-in zet de optie expliciet op 'yes'.
# Locatie: /etc/ssh/sshd_config.d/50-password-auth.conf
#
# Toepassen: sudo systemctl restart ssh
# Verifiëren: sudo sshd -T | grep -i passwordauthentication

PasswordAuthentication yes
